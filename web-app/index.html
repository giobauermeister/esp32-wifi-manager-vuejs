<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#343a40">
    <title>WiFi Manager</title>
    <script type="module" src="/src/app.js"></script>
  </head>
  <body>
    <main id="app" v-scope v-cloak @vue:mounted="mounted">
      <section class="card" aria-labelledby="page-title">
        <h1 id="page-title">WiFi Manager</h1>

        <div class="status" role="status">
          <span class="status-led" :class="{ connected: isDeviceConnected }"></span>
          <span>{{ isDeviceConnected ? 'Connected' : 'Not connected' }}</span>
          <span v-if="isDeviceConnected" class="mac-address">{{ macAddress }}</span>
        </div>

        <div class="field-group has-button scan-field">
          <label for="ssid">SSID</label>
          <input id="ssid" v-model="ssid" autocomplete="off">
          <button type="button" class="field-button" @click="toggleNetworks" :disabled="isScanning">
            {{ isScanning ? 'Scanning…' : 'Scan' }}
          </button>
          <div v-if="showNetworks" class="network-list">
            <button v-for="network in ssidList" :key="network" type="button" @click="selectNetwork(network)">
              {{ network }}
            </button>
            <div v-if="isScanning" class="scan-loading" aria-label="Scanning for networks">
              <span class="spinner-grow"></span>
            </div>
            <p v-if="!isScanning && ssidList.length === 0">No networks found</p>
          </div>
        </div>

        <div class="field-group has-button">
          <label for="password">Password</label>
          <input id="password" :type="showPassword ? 'text' : 'password'" v-model="password" autocomplete="current-password">
          <button type="button" class="field-button icon-button" @click="showPassword = !showPassword" :aria-label="showPassword ? 'Hide password' : 'Show password'">
            <img v-if="!showPassword" src="./icons/eye.svg" alt="">
            <img v-else src="./icons/eye-slash.svg" alt="">
          </button>
        </div>

        <label class="switch-row">
          <input type="checkbox" v-model="isStaticIp">
          <span class="switch" aria-hidden="true"></span>
          <span>Static IP</span>
        </label>

        <div v-if="isStaticIp" class="static-fields">
          <div class="field-group"><label for="static-ip">IP Addr</label><input id="static-ip" v-model="staticIp" inputmode="decimal"></div>
          <div class="field-group"><label for="netmask">Netmask</label><input id="netmask" v-model="netmask" inputmode="decimal"></div>
          <div class="field-group"><label for="gateway">Gateway</label><input id="gateway" v-model="gateway" inputmode="decimal"></div>
        </div>

        <div class="actions">
          <button type="button" @click="confirmAction('save')">Save</button>
          <button type="button" @click="confirmAction('erase')">Erase</button>
          <button type="button" @click="confirmAction('test')">Test</button>
          <button type="button" @click="confirmAction('start')">Start</button>
        </div>
      </section>

      <div v-if="dialog" class="modal-backdrop" @click.self="!isTaskRunning && closeDialog()">
        <section class="modal" role="dialog" aria-modal="true" aria-labelledby="dialog-message">
          <p id="dialog-message">{{ dialogMessage }}</p>
          <span v-if="isTaskRunning" class="spinner" aria-label="Working"></span>
          <div v-else class="modal-actions">
            <button v-if="pendingAction" type="button" class="success" @click="runPendingAction">OK</button>
            <button type="button" :class="{ danger: pendingAction }" @click="closeDialog">
              {{ pendingAction ? 'Cancel' : 'OK' }}
            </button>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
